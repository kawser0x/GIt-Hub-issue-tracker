<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Link Daisy UI and Tailwind -->

    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- Link font awesome  -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer" />

    <link
      rel="shortcut icon"
      href="./assets/github-logo.png"
      type="image/x-icon" />

    <title>GitHub Issue Tracker</title>

    <!-- link css -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap"
      rel="stylesheet" />

    <link rel="stylesheet" href="./style.css" />
  </head>
  <body class="bg-[#F8FAFC]">
    <section
      id="login"
      class="flex min-h-screen justify-center items-center py-30">
      <div class="text-center">
        <fieldset
          class="fieldset bg-base-200 border-base-300 rounded-box w-xs border p-4">
          <div class="flex flex-col justify-center items-center space-y-2">
            <img src="./assets/github-logo.png" alt="" />
            <h2 class="text-2xl font-bold">GitHub Issues Tracker</h2>
            <p class="text-sm">Sing in to manage your issues</p>
          </div>

          <label class="label text-xl font-bold">Username</label>
          <input
            id="loginadmin"
            type="text "
            class="input"
            placeholder="admin" />
          <p class="text-start text-[#4A00FF]">Default : admin</p>

          <label class="label text-xl font-bold">Password</label>
          <input
            id="loginpass"
            type="password"
            class="input"
            placeholder="Password" />
          <p class="text-start text-[#4A00FF]">Default : admin123</p>

          <button id="loginbtn" class="btn btn-primary mt-4">Login</button>
        </fieldset>
      </div>
    </section>

    <main id="showIssue" class=" space-y-5">
      <header class="sticky top-0 space-y-1">
        <section class="w-full mx-auto">
        <div class="navbar bg-base-100 shadow-sm justify-between px-8">
          <div class="flex justify-center items-center gap-2">
            <img class="h-8" src="./assets/github-logo.png" />
            <p>GitHub Issues Tracker</p>
          </div>
          <div class="flex gap-2">
            <label
              class="input input-bordered flex items-center gap-2 w-55 md:w-auto">
              <i class="fa-solid fa-magnifying-glass opacity-70"></i>
              <input type="text" class="grow" placeholder="Search Issues..." />
            </label>
            <div class="btn btn-primary">
              <button>+New Issues</button>
            </div>
          </div>
        </div>
      </section>
      <section class="w-10/12 mx-auto bg-white shadow-lg px-5 py-2 rounded-md">
        <button id="allbutton" type="submit" class="btn btn-primary">All</button>
        <button id="openbutton" type="submit" class="btn ">Open</button>
        <button id="closedbutton" type="submit" class="btn ">Closed</button>
      </section>
      <section
        class="flex justify-between items-center w-10/12 mx-auto bg-white shadow-lg px-5 py-2 rounded-md ">
        <div class="flex gap-3">
          <div>
            <img src="./assets/Aperture.png" />
          </div>
          <div>
            <h3><span id="countIssue">${0} </span> Issues</h3>
            <p>Track and manage your project issues</p>
          </div>
        </div>
        <div class="flex gap-2 items-center">
          <p class=""><i class="text-green-500 fa-solid fa-circle"></i> Open</p>

          <p class="">
            <i class="text-purple-500 fa-solid fa-circle"></i> Closed
          </p>
        </div>
      </section>
      </header>

      <section id="show-issues" class="w-9/12 mx-auto grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-3">
      
    </section>
    </main>



    <script src="./script.js"></script>
  </body>
</html>
